services:
  bullbear-postgres:
    image: postgres:16
    container_name: bullbear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bullbear_dev
    ports:
      - "5432:5432"
    volumes:
      - bullbear_postgres_data:/var/lib/postgresql/data
      - ./apps/web/docker/init:/docker-entrypoint-initdb.d

volumes:
  bullbear_postgres_data:
